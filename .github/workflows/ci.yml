---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.11.7"

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      - name: pre-commit/action
        uses: pre-commit/action@v3.0.1

  lint:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --frozen --all-extras || uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check --output-format=github .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Mypy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --frozen --all-extras || uv sync --all-extras
      - name: mypy
        run: uv run mypy src tests

  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --frozen --all-extras || uv sync --all-extras
      - name: pytest
        run: uv run pytest -v --tb=short
      - name: Smoke-test the built CLI
        run: |
          uv build
          uv run --no-project --with "./dist/$(ls dist/ | grep .whl | head -n1)" mirror-bench --help

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - run: uv sync --frozen --all-extras || uv sync --all-extras
      - name: Bandit
        run: uv run --with "bandit[toml]" bandit -c pyproject.toml -r src
      - name: pip-audit (runtime deps)
        run: |
          uv export --no-emit-project --format requirements.txt > .audit-reqs.txt
          uv run --with pip-audit pip-audit --progress-spinner off --strict --disable-pip -r .audit-reqs.txt

  docker:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: mirror-bench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mirror-bench:ci
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: Smoke test container
        run: docker run --rm mirror-bench:ci --help

  all-green:
    name: CI green
    runs-on: ubuntu-latest
    needs: [pre-commit, lint, typecheck, test, security, docker]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
